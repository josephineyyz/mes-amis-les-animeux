    <section class="section-light">
      <div class="content-box">
        <h2 class="section-heading">投稿表單</h2>
        <form>
          <div class="mb-3">
            <label class="form-label">文章標題</label>
            <input type="text" class="form-control" placeholder="請輸入標題">
          </div>

            <label class="form-label">動物名稱</label>

            <label class="form-label">上傳圖片</label>

          </div>

          <div class="mb-3">
            <label class="form-label">故事內容</label>
            <textarea class="form-control" rows="6" placeholder="請寫下你與動物相遇的小故事"></textarea>
